<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LatexGenius | Precision in Academic Publishing{% endblock %}</title>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,600;0,6..72,700;1,6..72,400&amp;family=Work+Sans:wght@400;500&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "primary": "#2563eb",
                    "primary-variant": "#1d4ed8",
                    "on-primary": "#ffffff",
                    "background": "#f8fafc",
                    "on-background": "#0f172a",
                    "surface": "#ffffff",
                    "on-surface": "#1e293b",
                    "surface-variant": "#f1f5f9",
                    "on-surface-variant": "#475569",
                    "outline": "#94a3b8",
                    "outline-variant": "#cbd5e1",
                    "error": "#ef4444",
                    "on-error": "#ffffff"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "fontFamily": {
                    "headline": ["Newsreader", "serif"],
                    "body": ["Inter", "sans-serif"],
                    "label": ["Work Sans", "sans-serif"]
            },
            "screens": {
                "xs": "475px",
                "sm": "640px",
                "md": "768px",
                "lg": "1024px",
                "xl": "1280px",
                "2xl": "1536px",
            }
          },
        },
      }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        body { font-family: 'Inter', sans-serif; }
        .font-serif { font-family: 'Newsreader', serif; }

        /* Dark mode overrides for custom background and surfaces */
        .dark body {
            background-color: #0f172a;
            color: #f8fafc;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); }
            to { transform: translateX(0); }
        }
        .animate-toast {
            animation: slideIn 0.3s ease-out forwards;
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-background dark:bg-[#0f172a] font-body text-on-background dark:text-slate-200 antialiased transition-colors duration-300">
    {% block layout %}
    {% include "components/navbar.html" %}

    <main>
        {% block content %}
        {% endblock %}
    </main>

    {% include "components/footer.html" %}
    {% endblock %}

    <!-- Toast Notification Container -->
    <div id="toast-container" class="fixed bottom-5 right-5 z-[100] flex flex-col gap-3"></div>

    {% block extra_scripts %}{% endblock %}
    <script>
        // Check for saved theme preference, otherwise use system preference
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }

        function toggleTheme() {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            }
        }

        /**
         * toast function to show notifications
         * @param {string} message - The message to display
         * @param {'success' | 'error' | 'info'} type - The type of toast
         */
        function toast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');

            const bgClass = type === 'success' ? 'bg-emerald-500' : type === 'error' ? 'bg-error' : 'bg-primary';
            const icon = type === 'success' ? 'check_circle' : type === 'error' ? 'error' : 'info';

            toast.className = `${bgClass} text-white px-6 py-3 rounded-xl shadow-lg flex items-center gap-3 animate-toast transform transition-all duration-300`;

            const iconSpan = document.createElement('span');
            iconSpan.className = 'material-symbols-outlined text-xl';
            iconSpan.textContent = icon;

            const messageSpan = document.createElement('span');
            messageSpan.className = 'text-sm font-bold';
            messageSpan.textContent = message;

            toast.appendChild(iconSpan);
            toast.appendChild(messageSpan);

            container.appendChild(toast);

            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-x-full');
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }
    </script>
</body>
</html>
