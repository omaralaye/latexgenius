<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LatexGenius | Precision in Academic Publishing{% endblock %}</title>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,600;0,6..72,700;1,6..72,400&amp;family=Work+Sans:wght@400;500&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "secondary-fixed": "#d8e3fa",
                    "tertiary-fixed": "#d9d7f8",
                    "tertiary-fixed-dim": "#cbc9e9",
                    "inverse-primary": "#b3cdfd",
                    "error-dim": "#4e0309",
                    "on-surface-variant": "#546166",
                    "primary-fixed": "#d6e3ff",
                    "primary-container": "#d6e3ff",
                    "on-secondary-fixed": "#354052",
                    "on-error-container": "#752121",
                    "primary": "#455f88",
                    "on-surface": "#283439",
                    "error": "#9f403d",
                    "on-tertiary-container": "#4a4a65",
                    "tertiary": "#5d5d78",
                    "secondary-fixed-dim": "#cad5ec",
                    "secondary-container": "#d8e3fa",
                    "on-primary": "#f6f7ff",
                    "surface-dim": "#ccdde4",
                    "surface-container-low": "#eff4f7",
                    "on-primary-container": "#38527b",
                    "inverse-on-surface": "#9a9d9f",
                    "surface-variant": "#d7e5eb",
                    "surface-bright": "#f7fafc",
                    "on-tertiary-fixed-variant": "#54546f",
                    "surface-container": "#e7eff3",
                    "secondary": "#546073",
                    "on-primary-fixed": "#254067",
                    "on-secondary-fixed-variant": "#515c6f",
                    "primary-dim": "#39537c",
                    "inverse-surface": "#0b0f10",
                    "surface-container-highest": "#d7e5eb",
                    "surface-container-high": "#dfeaef",
                    "tertiary-container": "#d9d7f8",
                    "on-tertiary-fixed": "#373851",
                    "surface-tint": "#455f88",
                    "on-tertiary": "#fbf7ff",
                    "on-error": "#fff7f6",
                    "background": "#f7fafc",
                    "on-primary-fixed-variant": "#425c85",
                    "outline": "#707d82",
                    "surface": "#f7fafc",
                    "error-container": "#fe8983",
                    "primary-fixed-dim": "#bfd5ff",
                    "on-background": "#283439",
                    "tertiary-dim": "#51516c",
                    "surface-container-lowest": "#ffffff",
                    "secondary-dim": "#495467",
                    "outline-variant": "#a7b4ba",
                    "on-secondary": "#f8f8ff",
                    "on-secondary-container": "#475265"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "fontFamily": {
                    "headline": ["Newsreader", "serif"],
                    "body": ["Inter", "sans-serif"],
                    "label": ["Work Sans", "sans-serif"]
            },
            "screens": {
                "xs": "475px",
                "sm": "640px",
                "md": "768px",
                "lg": "1024px",
                "xl": "1280px",
                "2xl": "1536px",
            }
          },
        },
      }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        body {
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
        }
        .font-serif { font-family: 'Newsreader', serif; }
        .glass-panel {
            background: rgba(215, 229, 235, 0.7);
            backdrop-filter: blur(20px);
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-surface font-body text-on-surface antialiased">
    {% block layout %}
    {% include "components/navbar.html" %}

    <main>
        {% block content %}
        {% endblock %}
    </main>

    {% include "components/footer.html" %}
    {% endblock %}

    {% block extra_scripts %}{% endblock %}
</body>
</html>
