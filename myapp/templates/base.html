<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LaTeX Genius{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Clerk SDK -->
    <script
        async
        crossorigin="anonymous"
        data-clerk-publishable-key="{{ CLERK_PUBLISHABLE_KEY }}"
        src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js"
        type="text/javascript"
    ></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col">
    {% include "components/navbar.html" %}

    <main class="flex-grow">
        {% block content %}
        {% endblock %}
    </main>

    {% include "components/footer.html" %}

    <script>
        window.addEventListener('load', async function () {
            await Clerk.load();

            const userButtonDiv = document.getElementById('user-button');
            const signInBtn = document.getElementById('sign-in-btn');
            const signUpBtn = document.getElementById('sign-up-btn');
            const heroSignUpBtn = document.getElementById('hero-sign-up-btn');

            if (Clerk.user) {
                if (userButtonDiv) {
                    Clerk.mountUserButton(userButtonDiv);
                }
            } else {
                if (signInBtn) {
                    signInBtn.addEventListener('click', () => Clerk.openSignIn());
                }
                if (signUpBtn) {
                    signUpBtn.addEventListener('click', () => Clerk.openSignUp());
                }
                if (heroSignUpBtn) {
                    heroSignUpBtn.addEventListener('click', () => Clerk.openSignUp());
                }
            }
        });
    </script>
</body>
</html>
