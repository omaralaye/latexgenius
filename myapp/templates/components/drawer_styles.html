<style>

        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s ease;
    }
    .drawer-overlay.open {
        opacity: 1;
        pointer-events: auto;
    }
    .drawer-panel {
        transform: translateX(-100%);
        transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
