<header class="sticky top-0 z-50 bg-[#eff4f7] dark:bg-[#1A365D]/10 backdrop-blur-md">
    <nav class="flex justify-between items-center w-full px-8 py-4 max-w-7xl mx-auto">
        <a href="{% url 'landing' %}" class="text-2xl font-bold font-serif text-[#1A365D] dark:text-[#d7e5eb]">{{ app_settings.app_name|default:"LatexGenius" }}</a>
        <div class="hidden md:flex items-center space-x-8 font-serif font-medium Newsreader">
            <a class="{% if request.resolver_match.url_name == 'landing' %}text-[#1A365D] dark:text-white border-b-2 border-[#455f88] pb-1{% else %}text-[#283439] dark:text-[#a7b4ba]{% endif %} hover:text-[#455f88] dark:hover:text-white transition-colors duration-300" href="{% url 'landing' %}">Features</a>
            <a class="{% if request.resolver_match.url_name == 'templates' %}text-[#1A365D] dark:text-white border-b-2 border-[#455f88] pb-1{% else %}text-[#283439] dark:text-[#a7b4ba]{% endif %} hover:text-[#455f88] dark:hover:text-white transition-colors duration-300" href="{% url 'templates' %}">Templates</a>
            <a class="text-[#283439] dark:text-[#a7b4ba] hover:text-[#455f88] dark:hover:text-white transition-colors duration-300" href="#">Pricing</a>
            <a class="text-[#283439] dark:text-[#a7b4ba] hover:text-[#455f88] dark:hover:text-white transition-colors duration-300" href="#">Documentation</a>
        </div>
        <div class="flex items-center gap-4">
            {% if user.is_authenticated %}
                <a href="{% url 'dashboard' %}" class="bg-primary text-on-primary px-6 py-2.5 rounded-lg font-medium transition-all hover:opacity-90 scale-95 duration-300 ease-in-out whitespace-nowrap">
                    Dashboard
                </a>
                <a href="{% url 'logout' %}" class="text-[#283439] dark:text-[#a7b4ba] hover:text-[#455f88] dark:hover:text-white transition-colors duration-300 font-serif font-medium">Logout</a>
            {% else %}
                <a href="{% url 'login' %}" class="bg-primary text-on-primary px-6 py-2.5 rounded-lg font-medium transition-all hover:opacity-90 scale-95 duration-300 ease-in-out whitespace-nowrap">
                    Get Started
                </a>
            {% endif %}
        </div>
    </nav>
</header>
